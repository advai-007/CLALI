<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Play-Plastic Workshop - Main Garage Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#55a6f6",
                        "plastic-blue": "#4DA6FF",
                        "plastic-red": "#FF5C5C",
                        "plastic-yellow": "#FFD93D",
                        "plastic-green": "#4ADE80",
                        "surface-wood": "#FDBA74",
                        "plastic-dark": "#4B5563",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Fredoka", "Spline Sans", "sans-serif"],
                        "body": ["Spline Sans", "sans-serif"]
                    },
                    boxShadow: {
                        'plastic-up': 'inset 0 4px 6px rgba(255,255,255,0.6), 0 4px 0 rgba(0,0,0,0.1)',
                        'plastic-card': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 2px 4px rgba(255,255,255,0.5)',
                        'plastic-inset': 'inset 0 4px 8px rgba(0,0,0,0.15)',
                        'plastic-float': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    },
                    animation: {
                        'bounce-slow': 'bounce-gentle 3s infinite ease-in-out',
                        'float': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        'bounce-gentle': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        .plastic-object {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .plastic-object:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            cursor: pointer;
        }
        /* Specific texture patterns */
        .bg-pattern-dots {
            background-image: radial-gradient(#ffffff 20%, transparent 20%), radial-gradient(#ffffff 20%, transparent 20%);
            background-color: transparent;
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            opacity: 0.1;
        }
        .wood-texture {
            background-image: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, transparent 25%, rgba(0,0,0,0.05) 50%, transparent 75%, rgba(255,255,255,0.1) 100%);
            background-size: 40px 100%;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark h-screen w-full overflow-hidden font-display select-none">
<!-- Background Scene Layer -->
<div class="absolute inset-0 z-0 flex flex-col h-full w-full">
<!-- Wall -->
<div class="h-[65%] w-full bg-plastic-blue relative border-b-[12px] border-black/5 shadow-inner">
<div class="absolute inset-0 bg-pattern-dots mix-blend-overlay"></div>
<!-- Decorative Wall Elements -->
<div class="absolute top-1/4 left-20 w-32 h-40 bg-white/20 rounded-xl shadow-plastic-inset flex items-center justify-center transform -rotate-3">
<div class="text-white/40 font-bold text-6xl">A</div>
</div>
<div class="absolute top-1/3 right-32 w-24 h-24 bg-plastic-yellow/80 rounded-full shadow-plastic-card flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-white text-5xl">light_mode</span>
</div>
<!-- Tools hanging on wall -->
<div class="absolute top-1/2 left-[30%] flex gap-4 opacity-30">
<span class="material-symbols-outlined text-white text-6xl transform -rotate-45">build</span>
<span class="material-symbols-outlined text-white text-6xl transform rotate-12">handyman</span>
</div>
</div>
<!-- Floor -->
<div class="h-[35%] w-full bg-[#E5E7EB] relative">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/concrete-wall.png')] opacity-30"></div>
<!-- Floor Shadow under lift -->
<div class="absolute top-[-20px] left-1/2 transform -translate-x-1/2 w-[600px] h-[100px] bg-black/10 rounded-[100%] blur-xl"></div>
</div>
</div>
<!-- UI HUD Layer -->
<div class="absolute top-0 left-0 w-full z-50 flex justify-center pt-6 px-6 pointer-events-none">
<div class="bg-white rounded-full shadow-plastic-float px-4 py-2 flex items-center justify-between min-w-[320px] pointer-events-auto border-4 border-white">
<!-- Back Button -->
<button class="flex items-center justify-center w-12 h-12 bg-gray-100 rounded-full text-plastic-dark hover:bg-gray-200 transition-colors shadow-plastic-up active:shadow-plastic-inset active:translate-y-0.5">
<span class="material-symbols-outlined font-bold text-2xl">arrow_back</span>
</button>
<!-- Title (Optional context) -->
<h1 class="text-plastic-dark text-xl font-bold tracking-wide uppercase px-4 hidden sm:block">Garage Hub</h1>
<!-- Stars Counter -->
<div class="flex items-center gap-2 bg-plastic-yellow/20 px-4 py-1.5 rounded-full border-2 border-plastic-yellow/30">
<span class="material-symbols-outlined text-plastic-yellow text-3xl drop-shadow-sm fill-current">star</span>
<span class="text-plastic-dark font-bold text-2xl">12</span>
</div>
</div>
</div>
<!-- Main Interaction Layer -->
<main class="absolute inset-0 z-10 flex items-end justify-center pb-[5vh] h-full w-full pointer-events-none">
<!-- Left Station: Tire Balance Bay -->
<div class="group/tire pointer-events-auto relative z-20 mb-12 -mr-20 xl:mr-0 plastic-object">
<div class="relative flex flex-col items-center">
<!-- Speech Bubble Label -->
<div class="absolute -top-16 opacity-0 group-hover/tire:opacity-100 transition-opacity duration-300 bg-white px-4 py-2 rounded-xl shadow-lg border-2 border-plastic-dark/10 mb-2">
<p class="font-bold text-plastic-dark text-lg whitespace-nowrap">Fix Tires!</p>
<div class="absolute bottom-[-6px] left-1/2 -translate-x-1/2 w-3 h-3 bg-white rotate-45 border-r-2 border-b-2 border-plastic-dark/10"></div>
</div>
<!-- Tire Stack Graphic -->
<div class="flex flex-col -space-y-12 items-center filter drop-shadow-2xl">
<!-- Tire 1 -->
<div class="w-40 h-24 bg-neutral-800 rounded-full border-b-[8px] border-black shadow-[inset_0_10px_20px_rgba(255,255,255,0.2)] flex items-center justify-center relative z-0 transform rotate-2">
<div class="w-20 h-10 bg-gray-400 rounded-full shadow-inner border-4 border-gray-500"></div>
<!-- Treads -->
<div class="absolute inset-0 rounded-full border-4 border-dashed border-gray-700 opacity-50"></div>
</div>
<!-- Tire 2 -->
<div class="w-44 h-28 bg-neutral-800 rounded-full border-b-[8px] border-black shadow-[inset_0_10px_20px_rgba(255,255,255,0.2)] flex items-center justify-center relative z-10 -ml-4 transform -rotate-3">
<div class="w-24 h-12 bg-gray-400 rounded-full shadow-inner border-4 border-gray-500"></div>
</div>
<!-- Tire 3 (Top) -->
<div class="w-40 h-24 bg-neutral-800 rounded-full border-b-[8px] border-black shadow-[inset_0_10px_20px_rgba(255,255,255,0.2)] flex items-center justify-center relative z-20 ml-2 transform rotate-6">
<div class="w-20 h-10 bg-gray-400 rounded-full shadow-inner border-4 border-gray-500 flex items-center justify-center">
<span class="material-symbols-outlined text-gray-600 text-3xl">add_circle</span>
</div>
</div>
</div>
</div>
</div>
<!-- Center Station: Car Lift -->
<div class="group/lift pointer-events-auto relative z-30 mx-8 plastic-object flex flex-col items-center justify-end h-full max-h-[85vh]">
<!-- Speech Bubble Label -->
<div class="absolute top-[20%] opacity-0 group-hover/lift:opacity-100 transition-opacity duration-300 bg-white px-6 py-3 rounded-2xl shadow-xl border-4 border-plastic-blue mb-4 z-50 animate-bounce">
<p class="font-bold text-plastic-dark text-xl whitespace-nowrap">Start Here!</p>
<div class="absolute bottom-[-8px] left-1/2 -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-r-4 border-b-4 border-plastic-blue"></div>
</div>
<!-- The Car -->
<div class="relative w-[500px] h-[300px] animate-bounce-slow z-40">
<!-- Car Body -->
<div class="absolute bottom-12 left-10 w-[420px] h-[180px] bg-plastic-green rounded-3xl shadow-plastic-card border-b-8 border-green-600 flex overflow-hidden">
<!-- Door -->
<div class="absolute top-4 left-32 w-32 h-32 border-4 border-green-700/20 rounded-xl"></div>
<!-- Handle -->
<div class="absolute top-12 left-56 w-10 h-3 bg-green-800 rounded-full shadow-sm"></div>
<!-- Stripe -->
<div class="absolute top-1/2 w-full h-8 bg-white/20"></div>
<!-- Headlight -->
<div class="absolute right-[-10px] top-10 w-8 h-12 bg-yellow-100 rounded-l-full shadow-[0_0_15px_rgba(255,255,0,0.6)]"></div>
</div>
<!-- Cabin/Windows -->
<div class="absolute bottom-[180px] left-24 w-[280px] h-[110px] bg-blue-100 rounded-t-[50px] border-4 border-green-600 z-0">
<div class="w-full h-full bg-blue-200/50 rounded-t-[45px] relative overflow-hidden">
<!-- Reflection -->
<div class="absolute top-2 right-4 w-12 h-20 bg-white/40 skew-x-[-20deg] rounded-full"></div>
</div>
</div>
<!-- Wheels -->
<div class="absolute bottom-0 left-20 w-24 h-24 bg-neutral-800 rounded-full border-8 border-neutral-900 shadow-lg flex items-center justify-center">
<div class="w-10 h-10 bg-gray-300 rounded-full border-2 border-gray-400"></div>
</div>
<div class="absolute bottom-0 right-32 w-24 h-24 bg-neutral-800 rounded-full border-8 border-neutral-900 shadow-lg flex items-center justify-center">
<div class="w-10 h-10 bg-gray-300 rounded-full border-2 border-gray-400"></div>
</div>
<!-- Exhaust/Smoke -->
<div class="absolute bottom-4 -left-8 flex gap-2 animate-pulse opacity-60">
<div class="w-6 h-6 bg-gray-300 rounded-full"></div>
<div class="w-4 h-4 bg-gray-300 rounded-full mt-2"></div>
</div>
</div>
<!-- The Hydraulic Lift -->
<div class="relative flex flex-col items-center -mt-10 z-10 w-full">
<!-- Platform -->
<div class="w-[480px] h-6 bg-red-700 rounded-full shadow-lg z-20"></div>
<!-- Main Piston -->
<div class="w-32 h-48 bg-plastic-red rounded-b-2xl border-x-8 border-red-400 shadow-plastic-inset relative z-10 flex justify-center">
<!-- Shine -->
<div class="w-4 h-full bg-white/20 absolute left-4 rounded-full"></div>
<div class="w-2 h-full bg-white/10 absolute left-10 rounded-full"></div>
</div>
<!-- Base -->
<div class="w-64 h-12 bg-gray-700 rounded-t-[30px] border-t-4 border-gray-500 shadow-xl mt-[-10px] z-0"></div>
</div>
</div>
<!-- Right Station: Workbench -->
<div class="group/bench pointer-events-auto relative z-20 mb-8 -ml-20 xl:ml-0 plastic-object">
<div class="relative flex flex-col items-center">
<!-- Speech Bubble Label -->
<div class="absolute -top-24 opacity-0 group-hover/bench:opacity-100 transition-opacity duration-300 bg-white px-4 py-2 rounded-xl shadow-lg border-2 border-plastic-dark/10 mb-2">
<p class="font-bold text-plastic-dark text-lg whitespace-nowrap">Sort Gears!</p>
<div class="absolute bottom-[-6px] left-1/2 -translate-x-1/2 w-3 h-3 bg-white rotate-45 border-r-2 border-b-2 border-plastic-dark/10"></div>
</div>
<!-- Bench Graphic -->
<div class="relative w-64 h-40 filter drop-shadow-2xl">
<!-- Bench Top -->
<div class="absolute top-10 left-0 w-full h-12 bg-surface-wood wood-texture rounded-lg border-b-8 border-[#d99f60] shadow-md z-20 flex items-center justify-center overflow-hidden">
<!-- Nails -->
<div class="absolute left-2 top-2 w-2 h-2 bg-black/20 rounded-full"></div>
<div class="absolute right-2 top-2 w-2 h-2 bg-black/20 rounded-full"></div>
</div>
<!-- Legs -->
<div class="absolute top-20 left-4 w-6 h-20 bg-gray-400 rounded-b-lg border-r-4 border-gray-500 shadow-inner z-10"></div>
<div class="absolute top-20 right-4 w-6 h-20 bg-gray-400 rounded-b-lg border-l-4 border-gray-500 shadow-inner z-10"></div>
<!-- Props on Bench (Gears) -->
<!-- Gear 1 -->
<div class="absolute -top-2 left-6 text-plastic-red animate-spin-slow">
<span class="material-symbols-outlined text-6xl drop-shadow-md" style="font-variation-settings: 'FILL' 1, 'wght' 700;">settings</span>
</div>
<!-- Gear 2 -->
<div class="absolute top-4 right-10 text-plastic-blue transform rotate-45">
<span class="material-symbols-outlined text-5xl drop-shadow-md" style="font-variation-settings: 'FILL' 1, 'wght' 700;">settings_suggest</span>
</div>
<!-- Wrench -->
<div class="absolute top-8 left-20 text-gray-500 transform -rotate-12 opacity-80 z-20">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">build</span>
</div>
</div>
</div>
</div>
</main>
<!-- Overlay Particles/Decorations (Optional atmosphere) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0 opacity-20">
<div class="absolute top-10 left-10 w-32 h-32 bg-white rounded-full blur-3xl"></div>
<div class="absolute bottom-10 right-10 w-64 h-64 bg-blue-300 rounded-full blur-3xl"></div>
</div>
</body></html>
