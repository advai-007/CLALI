<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tire Balance Bay - Play-Plastic Workshop</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@700;800&amp;family=Varela+Round&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4DA6FF", // Plastic Blue
                        "plastic-red": "#FF5C5C",
                        "plastic-yellow": "#FFD93D",
                        "plastic-green": "#4ADE80",
                        "plastic-dark": "#4B5563",
                        "surface-wood": "#FDBA74",
                        "surface-wood-dark": "#F97316", // Darker wood for shadows
                        "base-grey": "#E5E7EB",
                        "metal-light": "#F1F5F9",
                        "metal-dark": "#94A3B8",
                    },
                    fontFamily: {
                        "heading": ['"Fredoka One"', "cursive"],
                        "body": ['"Varela Round"', "sans-serif"],
                        "math": ['"Nunito"', "sans-serif"],
                        "display": ["Spline Sans"], // Fallback from system config
                    },
                    boxShadow: {
                        "plastic-up": "inset 0 4px 6px rgba(255,255,255,0.4), 0 6px 0 rgba(0,0,0,0.15)",
                        "plastic-down": "inset 0 6px 8px rgba(0,0,0,0.2)",
                        "plastic-flat": "0 2px 0 rgba(0,0,0,0.1)",
                        "sticker": "inset 0 -2px 0 rgba(0,0,0,0.1)",
                        "float": "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)",
                    },
                    animation: {
                        'wobble-slow': 'wobble 3s ease-in-out infinite',
                        'spin-fast': 'spin 0.5s linear infinite',
                    },
                    keyframes: {
                        wobble: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        /* Custom Styles for specific plastic effects not covered by Tailwind utilities */
        .text-shadow-sm {
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .pattern-grid {
            background-image: radial-gradient(#9ca3af 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .wood-texture {
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 12px);
        }
    </style>
</head>
<body class="bg-base-grey h-screen w-full overflow-hidden flex flex-col font-body selection:bg-primary selection:text-white">
<!-- Top Navigation HUD -->
<header class="absolute top-0 left-0 w-full z-50 p-4 pointer-events-none">
<div class="max-w-7xl mx-auto flex justify-between items-start">
<!-- Back Button -->
<button class="pointer-events-auto group flex items-center justify-center w-14 h-14 bg-white rounded-full shadow-plastic-up active:shadow-none active:translate-y-1 transition-all border-4 border-white hover:border-primary/20">
<span class="material-symbols-outlined text-plastic-dark text-3xl group-hover:text-primary transition-colors font-bold">arrow_back</span>
</button>
<!-- Title (Visible on larger screens) -->
<div class="hidden md:block pointer-events-auto bg-white/90 backdrop-blur-sm px-8 py-3 rounded-2xl shadow-plastic-flat border-b-4 border-black/5">
<h1 class="text-2xl font-heading text-plastic-dark tracking-wide">TIRE BALANCE BAY</h1>
</div>
<!-- Star Counter -->
<div class="pointer-events-auto flex items-center gap-3 bg-white px-5 py-2 rounded-full shadow-plastic-up border-4 border-white h-14">
<span class="text-plastic-yellow drop-shadow-sm material-symbols-outlined text-4xl filled" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-plastic-dark font-math font-extrabold text-2xl">12</span>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col md:flex-row h-full w-full relative">
<!-- WORK ZONE (Left/Top) -->
<section class="relative flex-1 bg-base-grey pattern-grid flex flex-col items-center justify-center p-6 md:p-10 lg:p-16 overflow-hidden">
<!-- Background Elements -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/5 pointer-events-none"></div>
<!-- Lift Arm (Visual Decoration) -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-48 h-[40%] bg-plastic-dark rounded-t-3xl border-x-8 border-t-8 border-black/10 shadow-inner z-0"></div>
<!-- Digital Readout Panel -->
<div class="relative z-10 mb-8 w-full max-w-sm">
<div class="bg-plastic-dark rounded-2xl p-4 shadow-xl border-b-8 border-black/20">
<div class="flex justify-between items-center mb-2 px-2">
<span class="text-white/60 font-heading text-xs uppercase tracking-widest">System Status</span>
<div class="flex gap-1">
<div class="w-2 h-2 rounded-full bg-plastic-red animate-pulse"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
</div>
</div>
<div class="bg-black/40 rounded-xl p-4 shadow-plastic-down flex justify-between items-center relative overflow-hidden">
<!-- Scanlines overlay -->
<div class="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%] pointer-events-none z-20"></div>
<div class="flex flex-col">
<span class="text-plastic-green font-math font-bold text-sm uppercase opacity-80">Target</span>
<span class="text-plastic-green font-math font-black text-4xl tabular-nums leading-none tracking-tight drop-shadow-[0_0_8px_rgba(74,222,128,0.5)]">10</span>
</div>
<div class="h-10 w-[2px] bg-white/10 mx-4"></div>
<div class="flex flex-col items-end">
<span class="text-plastic-red font-math font-bold text-sm uppercase opacity-80">Current</span>
<span class="text-plastic-red font-math font-black text-4xl tabular-nums leading-none tracking-tight drop-shadow-[0_0_8px_rgba(255,92,92,0.5)]">0</span>
</div>
</div>
</div>
<!-- Connection Cables -->
<div class="absolute -top-12 left-8 w-4 h-12 bg-plastic-dark rounded-full -z-10"></div>
<div class="absolute -top-12 right-8 w-4 h-12 bg-plastic-dark rounded-full -z-10"></div>
</div>
<!-- The Wheel Assembly -->
<div class="relative z-10 group cursor-pointer animate-wobble-slow origin-center">
<!-- Tire Rubber -->
<div class="w-64 h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 rounded-full bg-[#2a2f35] border-8 border-[#1f2329] shadow-[0_20px_40px_-10px_rgba(0,0,0,0.5)] flex items-center justify-center relative">
<!-- Tread Pattern (CSS Gradient) -->
<div class="absolute inset-0 rounded-full border-[16px] border-dashed border-[#343940]/50"></div>
<!-- Silver Rim -->
<div class="w-40 h-40 md:w-52 md:h-52 lg:w-64 lg:h-64 rounded-full bg-gradient-to-br from-metal-light to-metal-dark shadow-[inset_0_4px_10px_rgba(0,0,0,0.4)] flex items-center justify-center relative">
<!-- Inner Hub -->
<div class="absolute inset-0 m-auto w-12 h-12 bg-plastic-dark rounded-full shadow-[0_2px_4px_rgba(0,0,0,0.3)] flex items-center justify-center z-20">
<!-- Lug nuts -->
<div class="w-1.5 h-1.5 bg-metal-light rounded-full absolute top-2"></div>
<div class="w-1.5 h-1.5 bg-metal-light rounded-full absolute bottom-2"></div>
<div class="w-1.5 h-1.5 bg-metal-light rounded-full absolute left-2"></div>
<div class="w-1.5 h-1.5 bg-metal-light rounded-full absolute right-2"></div>
</div>
<!-- Weight Slots (Drop Zones) -->
<!-- Top Slot -->
<div class="absolute top-2 left-1/2 -translate-x-1/2 w-12 h-8 md:w-16 md:h-10 bg-black/20 rounded-md border-2 border-dashed border-black/30 shadow-inner flex items-center justify-center transition-colors hover:bg-plastic-yellow/20 hover:border-plastic-yellow">
<span class="opacity-0 group-hover:opacity-100 transition-opacity text-black/20 font-heading text-xs">+</span>
</div>
<!-- Bottom Slot -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-12 h-8 md:w-16 md:h-10 bg-black/20 rounded-md border-2 border-dashed border-black/30 shadow-inner flex items-center justify-center transition-colors hover:bg-plastic-yellow/20 hover:border-plastic-yellow">
<span class="opacity-0 group-hover:opacity-100 transition-opacity text-black/20 font-heading text-xs">+</span>
</div>
<!-- Right Slot -->
<div class="absolute right-2 top-1/2 -translate-y-1/2 h-12 w-8 md:h-16 md:w-10 bg-black/20 rounded-md border-2 border-dashed border-black/30 shadow-inner flex items-center justify-center transition-colors hover:bg-plastic-yellow/20 hover:border-plastic-yellow">
<span class="opacity-0 group-hover:opacity-100 transition-opacity text-black/20 font-heading text-xs">+</span>
</div>
<!-- Left Slot -->
<div class="absolute left-2 top-1/2 -translate-y-1/2 h-12 w-8 md:h-16 md:w-10 bg-black/20 rounded-md border-2 border-dashed border-black/30 shadow-inner flex items-center justify-center transition-colors hover:bg-plastic-yellow/20 hover:border-plastic-yellow">
<span class="opacity-0 group-hover:opacity-100 transition-opacity text-black/20 font-heading text-xs">+</span>
</div>
</div>
</div>
</div>
<!-- Hint/Instruction -->
<div class="absolute bottom-6 bg-white/80 px-6 py-2 rounded-full backdrop-blur text-plastic-dark font-heading text-sm shadow-sm border border-white">
                Drag weights to the empty slots!
            </div>
</section>
<!-- TOOL TRAY (Right/Bottom) -->
<aside class="relative z-20 w-full md:w-[320px] lg:w-[380px] bg-surface-wood wood-texture shadow-[0_-4px_20px_rgba(0,0,0,0.2)] md:shadow-[-4px_0_20px_rgba(0,0,0,0.2)] flex flex-col border-t-8 md:border-t-0 md:border-l-8 border-surface-wood-dark/30">
<!-- Tray Header -->
<div class="p-6 pb-2 text-center md:text-left">
<h2 class="text-white text-shadow-sm font-heading text-xl uppercase tracking-wider mb-1">Tool Tray</h2>
<div class="h-1 w-full bg-black/10 rounded-full"></div>
</div>
<!-- Weights Container -->
<div class="flex-1 p-6 flex flex-row md:flex-col gap-6 items-center justify-center md:justify-start overflow-x-auto md:overflow-y-auto">
<!-- Weight Block: 1 -->
<div class="group relative cursor-grab active:cursor-grabbing w-20 md:w-full max-w-[140px] aspect-square md:aspect-auto md:h-24 bg-[#E2E8F0] rounded-xl shadow-plastic-up border-b-[6px] border-[#94A3B8] active:border-b-0 active:translate-y-[6px] active:shadow-none transition-all flex flex-col items-center justify-center hover:brightness-105">
<div class="absolute top-2 inset-x-2 h-1/2 bg-white/40 rounded-t-lg pointer-events-none"></div>
<span class="text-plastic-dark font-math font-black text-4xl select-none">1</span>
<span class="text-[#94A3B8] font-heading text-[10px] uppercase tracking-wider mt-1 select-none">Unit</span>
</div>
<!-- Weight Block: 2 -->
<div class="group relative cursor-grab active:cursor-grabbing w-24 md:w-full max-w-[160px] aspect-square md:aspect-auto md:h-28 bg-[#93C5FD] rounded-xl shadow-plastic-up border-b-[6px] border-[#3B82F6] active:border-b-0 active:translate-y-[6px] active:shadow-none transition-all flex flex-col items-center justify-center hover:brightness-105">
<div class="absolute top-2 inset-x-2 h-1/2 bg-white/30 rounded-t-lg pointer-events-none"></div>
<span class="text-[#1E3A8A] font-math font-black text-5xl select-none">2</span>
<span class="text-[#1E3A8A]/60 font-heading text-[10px] uppercase tracking-wider mt-1 select-none">Units</span>
</div>
<!-- Weight Block: 5 -->
<div class="group relative cursor-grab active:cursor-grabbing w-28 md:w-full max-w-[180px] aspect-square md:aspect-auto md:h-32 bg-[#FCD34D] rounded-xl shadow-plastic-up border-b-[6px] border-[#D97706] active:border-b-0 active:translate-y-[6px] active:shadow-none transition-all flex flex-col items-center justify-center hover:brightness-105">
<div class="absolute top-2 inset-x-2 h-1/2 bg-white/40 rounded-t-lg pointer-events-none"></div>
<span class="text-[#78350F] font-math font-black text-6xl select-none">5</span>
<span class="text-[#78350F]/60 font-heading text-[10px] uppercase tracking-wider mt-1 select-none">Heavy</span>
</div>
</div>
<!-- Decorative Bottom/Side Edge -->
<div class="absolute bottom-0 inset-x-0 h-4 bg-surface-wood-dark/40 md:h-auto md:top-0 md:bottom-0 md:right-0 md:w-4 md:left-auto"></div>
</aside>
</main>
<!-- Success Overlay (Hidden by default, structure provided for completeness as it might be toggled via JS in a real app) -->
<!-- Note: In a static HTML output, we keep this hidden or minimal. Let's add a "ghost" of a success state that could be toggled. -->
<div class="hidden absolute inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center">
<div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl border-b-8 border-gray-200 transform scale-100">
<div class="w-24 h-24 bg-plastic-green rounded-full mx-auto mb-6 flex items-center justify-center shadow-plastic-up border-4 border-white">
<span class="material-symbols-outlined text-white text-5xl font-bold">check</span>
</div>
<h2 class="text-3xl font-heading text-plastic-dark mb-2">Balanced!</h2>
<p class="text-gray-500 font-body mb-8 text-lg">Great job fixing the tire.</p>
<button class="w-full py-4 bg-primary text-white rounded-xl font-heading text-xl shadow-plastic-up border-b-4 border-blue-600 active:border-b-0 active:translate-y-1 transition-all">
                Next Job
            </button>
</div>
</div>
</body></html>
