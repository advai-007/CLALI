<!DOCTYPE html>

<html lang="en"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fuel Mix Monitor - Play-Plastic Workshop</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#55a6f6",
                        "primary-dark": "#3b82f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101922",
                        "toy-red": "#FF5C5C",
                        "toy-yellow": "#FFD93D",
                        "toy-green": "#4ADE80",
                        "toy-orange": "#FDBA74",
                        "toy-purple": "#A78BFA",
                        "plastic-dark": "#4B5563",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "3xl": "3rem", "full": "9999px"},
                    boxShadow: {
                        'plastic-card': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 2px 0 rgba(255, 255, 255, 0.4)',
                        'plastic-inset': 'inset 0 4px 6px rgba(0,0,0,0.15), inset 0 -2px 2px rgba(255,255,255,0.2)',
                        'plastic-btn': '0 6px 0 rgba(0,0,0,0.15), 0 8px 10px rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.3)',
                        'plastic-btn-active': '0 0 0 rgba(0,0,0,0.15), inset 0 4px 8px rgba(0,0,0,0.2)',
                        'tank-glass': 'inset 0 0 20px rgba(255,255,255,0.5), 0 4px 6px rgba(0,0,0,0.05)',
                        'liquid-surface': '0 -4px 6px rgba(255,255,255,0.6), inset 0 4px 8px rgba(255,255,255,0.3)',
                    }
                },
            },
        }
    </script>
<style>
        /* Bubbling Animation */
        @keyframes rise {
            0% { bottom: -20px; transform: translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { bottom: 100%; transform: translateX(-20px); opacity: 0; }
        }
        
        @keyframes rise-alt {
            0% { bottom: -20px; transform: translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { bottom: 100%; transform: translateX(20px); opacity: 0; }
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        .bubble:nth-child(1) { width: 10px; height: 10px; left: 10%; animation: rise 4s infinite ease-in; }
        .bubble:nth-child(2) { width: 15px; height: 15px; left: 30%; animation: rise-alt 5s infinite ease-in 1s; }
        .bubble:nth-child(3) { width: 8px; height: 8px; left: 60%; animation: rise 3s infinite ease-in 2s; }
        .bubble:nth-child(4) { width: 12px; height: 12px; left: 80%; animation: rise-alt 6s infinite ease-in 0.5s; }

        /* Pour Animation Class (Simulated for design) */
        .pour-active {
            transform: rotate(45deg) translateY(10px);
        }

        /* Liquid Wave Effect */
        .liquid-surface {
            background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.5), rgba(255,255,255,0.1));
            background-size: 200% 100%;
            animation: wave 3s linear infinite;
        }
        @keyframes wave {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 h-screen overflow-hidden selection:bg-primary selection:text-white flex flex-col">
<!-- Top Navigation / HUD -->
<header class="h-20 flex-none px-6 py-4 flex items-center justify-between z-10 relative">
<!-- Back Button -->
<button class="bg-white dark:bg-slate-800 rounded-full p-3 shadow-plastic-btn hover:translate-y-0.5 hover:shadow-none transition-all active:shadow-plastic-btn-active border-b-4 border-slate-200 dark:border-slate-900">
<span class="material-icons-round text-plastic-dark dark:text-slate-200 text-3xl">arrow_back</span>
</button>
<!-- Title Pill -->
<div class="bg-white dark:bg-slate-800 px-8 py-3 rounded-2xl shadow-plastic-card border border-slate-100 dark:border-slate-700">
<h1 class="text-2xl font-bold text-plastic-dark dark:text-slate-200 tracking-wide">FUEL MIX MONITOR</h1>
</div>
<!-- Star Counter -->

<span class="text-2xl font-bold text-plastic-dark dark:text-slate-200 font-display">4/5</span>
</div>
</header>
<!-- Main Game Area -->

<!-- Game Container -->
<div class="relative w-full max-w-5xl h-full flex flex-col items-center justify-center gap-8">
<!-- LCD Target Display -->
<div class="bg-slate-800 dark:bg-black p-4 rounded-2xl shadow-plastic-btn border-4 border-slate-400 dark:border-slate-700 relative z-10 transform -rotate-1 w-72 text-center">
<div class="bg-[#2f3d30] rounded-lg p-3 shadow-inner border border-slate-600">
<p class="text-toy-green font-mono text-lg uppercase tracking-widest opacity-80 mb-1">Target Volume</p>
<div class="text-5xl font-mono text-toy-green font-bold tracking-tighter drop-shadow-[0_0_8px_rgba(74,222,128,0.6)]">
                        07 <span class="text-2xl">Liters</span>
</div>
</div>

<div class="absolute top-2 right-2 w-3 h-3 rounded-full bg-slate-400 shadow-inner"></div>

</div>

<div class="absolute -bottom-2 -right-4 w-8 h-4 bg-slate-400 rounded-full"></div> <!-- Drip -->

<!-- Main Tank -->

<!-- Measurement Ticks -->

<div class="bubble"></div>
